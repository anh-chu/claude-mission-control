<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voxel Traffic Escape</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1A1714;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #3D3A38;
        color: #E8E4DC;
        font-family: monospace;
        font-size: 14px;
        z-index: 100;
      }
      #loading h1 {
        font-size: 24px;
        margin-bottom: 16px;
        color: #F5C518;
      }
      #loading p {
        opacity: 0.7;
        max-width: 400px;
        text-align: center;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <h1>VOXEL TRAFFIC ESCAPE</h1>
      <p>Loading...</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
